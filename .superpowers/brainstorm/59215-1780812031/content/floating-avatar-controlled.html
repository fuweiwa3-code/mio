<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>澪 - 可控制悬浮人物</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --ink: #302b35;
      --muted: #807580;
      --line: #e5dbe0;
      --paper: #fbf8f9;
      --accent: #5b4653;
    }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 0%, rgba(217,195,206,.36), transparent 34%),
        #f4eff1;
      font-family: Inter, "PingFang SC", sans-serif;
    }
    button { font: inherit; }
    .page { max-width: 1160px; margin: 0 auto; padding: 24px; }
    .heading {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 17px;
    }
    h1 { margin: 0 0 6px; font: 600 28px/1.25 Georgia, serif; }
    .lead { margin: 0; color: var(--muted); font-size: 13px; }
    .phase {
      padding: 7px 11px;
      border: 1px solid #d9ccd2;
      border-radius: 999px;
      background: rgba(255,255,255,.62);
      color: #715f69;
      font-size: 11px;
    }
    .app {
      position: relative;
      height: min(720px, calc(100vh - 125px));
      min-height: 590px;
      overflow: hidden;
      border: 1px solid #ded2d8;
      border-radius: 24px;
      background: var(--paper);
      box-shadow: 0 22px 60px rgba(69,48,61,.12);
      perspective: 1100px;
    }
    .topbar {
      position: relative;
      z-index: 50;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.9);
      backdrop-filter: blur(15px);
    }
    .identity, .controls, .toggle-wrap { display: flex; align-items: center; }
    .identity { gap: 11px; }
    .mini-avatar {
      width: 36px; height: 36px;
      display: grid; place-items: center;
      border-radius: 50%;
      background: #9b818e;
      color: white;
      font-family: Georgia, serif;
    }
    .identity strong { display: block; font-size: 14px; }
    .identity small { color: #9a7b8a; font-size: 11px; }
    .controls { gap: 18px; }
    .voice { color: #766a72; font-size: 12px; }
    .toggle-wrap { gap: 9px; cursor: pointer; }
    .toggle-label { color: #685b63; font-size: 13px; font-weight: 600; }
    .toggle {
      position: relative;
      width: 44px; height: 25px;
      padding: 0;
      border: 0;
      border-radius: 999px;
      background: #cec3c8;
      cursor: pointer;
      transition: background .25s ease;
    }
    .toggle::after {
      content: "";
      position: absolute;
      top: 3px; left: 3px;
      width: 19px; height: 19px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 2px 7px rgba(50,35,44,.23);
      transition: transform .25s ease;
    }
    .toggle[aria-checked="true"] { background: var(--accent); }
    .toggle[aria-checked="true"]::after { transform: translateX(19px); }
    .messages {
      position: absolute;
      inset: 68px 0 0;
      z-index: 2;
      overflow: auto;
      padding: 34px clamp(25px, 9%, 92px) 120px;
    }
    .day { margin-bottom: 25px; color: #aaa0a6; text-align: center; font-size: 11px; }
    .row { display: flex; margin-bottom: 15px; }
    .row.mine { justify-content: flex-end; }
    .bubble {
      max-width: min(670px, 76%);
      padding: 11px 15px;
      border-radius: 17px 17px 17px 5px;
      background: #eee6ea;
      font-size: 14px;
      line-height: 1.55;
      overflow-wrap: anywhere;
    }
    .mine .bubble {
      border-radius: 17px 17px 5px 17px;
      background: var(--accent);
      color: white;
    }
    .app.avatar-on .messages { padding-right: clamp(230px, 27%, 315px); }
    .composer {
      position: absolute;
      z-index: 40;
      right: clamp(20px, 6%, 58px);
      bottom: 22px;
      left: clamp(20px, 6%, 58px);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px 10px 17px;
      border: 1px solid var(--line);
      border-radius: 17px;
      background: rgba(255,255,255,.94);
      box-shadow: 0 12px 32px rgba(72,50,64,.09);
      backdrop-filter: blur(13px);
    }
    .composer span { flex: 1; color: #aaa0a6; font-size: 13px; }
    .send {
      width: 36px; height: 36px;
      border: 0; border-radius: 12px;
      background: var(--accent); color: white;
    }
    .avatar-layer {
      position: absolute;
      z-index: 15;
      right: -22px;
      bottom: 45px;
      width: 270px;
      height: 475px;
      pointer-events: none;
      opacity: 0;
      transform: translate3d(55px, 15px, -30px) rotateY(-10deg) scale(.94);
      transform-origin: bottom right;
      transition:
        opacity .26s ease,
        transform .42s cubic-bezier(.22,.8,.22,1);
    }
    .app.avatar-on .avatar-layer {
      opacity: 1;
      transform: translate3d(0, 0, 32px) rotateY(-7deg) scale(1);
    }
    .depth-shadow {
      position: absolute;
      right: 2px; bottom: 10px;
      width: 235px; height: 52px;
      border-radius: 50%;
      background: rgba(76,52,66,.17);
      filter: blur(15px);
      transform: rotate(-7deg);
    }
    .character {
      position: absolute;
      right: 0; bottom: 0;
      width: 235px; height: 430px;
      filter: drop-shadow(-13px 25px 23px rgba(50,33,44,.2));
    }
    .body {
      position: absolute; left: 31px; bottom: 0;
      width: 176px; height: 210px;
      border-radius: 78px 78px 24px 24px;
      background: linear-gradient(155deg, #4a3d47, #211d23);
    }
    .neck { position: absolute; z-index: 2; left: 94px; bottom: 193px; width: 50px; height: 52px; background: #efd4cb; }
    .hair-back {
      position: absolute; z-index: 1; left: 29px; top: 10px;
      width: 180px; height: 275px;
      border-radius: 91px 91px 72px 72px;
      background: linear-gradient(145deg, #504250, #211e24);
    }
    .face {
      position: absolute; z-index: 3; left: 62px; top: 53px;
      width: 118px; height: 153px;
      border-radius: 57px 57px 62px 62px;
      background: linear-gradient(145deg, #fae8e0, #e7c5bb);
    }
    .bang {
      position: absolute; z-index: 4; left: 53px; top: 30px;
      width: 137px; height: 80px;
      border-radius: 70px 70px 45% 18%;
      background: #322b33;
      transform: rotate(-4deg);
    }
    .bang::after {
      content: "";
      position: absolute;
      right: -6px; top: 24px;
      width: 60px; height: 96px;
      border-radius: 50%;
      background: #322b33;
      transform: rotate(-17deg);
    }
    .eye {
      position: absolute; z-index: 5; top: 132px;
      width: 14px; height: 8px;
      border-bottom: 2px solid #574451;
      border-radius: 50%;
    }
    .eye.left { left: 91px; }
    .eye.right { right: 87px; }
    .mouth {
      position: absolute; z-index: 5; left: 113px; top: 169px;
      width: 14px; height: 6px;
      border-bottom: 2px solid #a66e72;
      border-radius: 50%;
    }
    .collar {
      position: absolute; z-index: 4; left: 82px; bottom: 176px;
      width: 76px; height: 43px;
      border-radius: 50%;
      border-bottom: 15px solid #efe7e5;
    }
    .avatar-control {
      position: absolute;
      z-index: 25;
      top: 7px;
      right: 25px;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 11px;
      border: 1px solid rgba(108,82,96,.18);
      border-radius: 11px;
      background: rgba(255,255,255,.88);
      color: #5d4c55;
      cursor: pointer;
      pointer-events: auto;
      box-shadow: 0 7px 20px rgba(61,44,55,.11);
      backdrop-filter: blur(10px);
    }
    .avatar-control b { font-size: 16px; line-height: 1; font-weight: 400; }
    .avatar-status {
      position: absolute;
      z-index: 20;
      right: 31px;
      bottom: 218px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.78);
      color: #705865;
      font-size: 10px;
      backdrop-filter: blur(9px);
    }
    .spatial-note {
      position: absolute;
      z-index: 12;
      right: 25px;
      bottom: 19px;
      color: #766871;
      font-size: 10px;
      opacity: 0;
      transition: opacity .25s ease .15s;
    }
    .avatar-on .spatial-note { opacity: 1; }
    @media (max-width: 760px) {
      .page { padding: 12px; }
      .phase, .voice { display: none; }
      h1 { font-size: 23px; }
      .app { min-height: 620px; height: calc(100vh - 104px); border-radius: 18px; }
      .messages, .app.avatar-on .messages { padding: 28px 18px 115px; }
      .bubble { max-width: 88%; }
      .app.avatar-on .row .bubble { max-width: 72%; }
      .avatar-layer { right: -50px; bottom: 52px; transform-origin: bottom right; }
      .app.avatar-on .avatar-layer { transform: translate3d(0,0,25px) rotateY(-7deg) scale(.82); }
      .avatar-control { right: 62px; top: 36px; }
      .avatar-control span { display: none; }
      .avatar-status { right: 72px; bottom: 190px; }
      .spatial-note { display: none; }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="heading">
      <div>
        <h1>悬浮人物 · 控制交互</h1>
        <p class="lead">人物位于右下角前景层；消息自动避让，开关和人物旁按钮都能关闭。</p>
      </div>
      <span class="phase">低保真结构稿</span>
    </div>

    <section class="app" id="app">
      <header class="topbar">
        <div class="identity">
          <div class="mini-avatar">澪</div>
          <div><strong>澪</strong><small>在线 · 安静陪着你</small></div>
        </div>
        <div class="controls">
          <span class="voice">开始语音陪伴</span>
          <label class="toggle-wrap">
            <span class="toggle-label">显示澪</span>
            <button class="toggle" id="avatarToggle" role="switch" aria-checked="false" aria-label="显示澪"></button>
          </label>
        </div>
      </header>

      <div class="messages">
        <div class="day">今天 21:14</div>
        <div class="row"><div class="bubble">今天的接口问题解决了吗？</div></div>
        <div class="row mine"><div class="bubble">还差一个奇怪的状态同步，找不到原因。</div></div>
        <div class="row"><div class="bubble">先别急。把状态变化顺序给我看看，尤其是请求结束之后发生了什么？</div></div>
        <div class="row mine"><div class="bubble">请求已经成功，但页面仍停在 thinking，刷新后才出现最终回复。</div></div>
        <div class="row"><div class="bubble">听起来像结束事件没有正确更新 UI。把最后几条事件贴给我，我们从那里开始。</div></div>
      </div>

      <div class="avatar-layer" aria-label="悬浮的澪">
        <div class="depth-shadow"></div>
        <button class="avatar-control" id="closeAvatar" aria-label="收起人物"><b>×</b><span>收起人物</span></button>
        <span class="avatar-status">LIVE2D · 待机</span>
        <div class="character">
          <div class="hair-back"></div><div class="body"></div><div class="neck"></div>
          <div class="face"></div><div class="bang"></div>
          <i class="eye left"></i><i class="eye right"></i><i class="mouth"></i><i class="collar"></i>
        </div>
      </div>

      <span class="spatial-note">人物处于前景层，消息区域自动避让</span>
      <div class="composer"><span>和澪说点什么…</span><button class="send">↑</button></div>
    </section>
  </main>

  <script>
    const app = document.querySelector("#app");
    const toggle = document.querySelector("#avatarToggle");
    const closeAvatar = document.querySelector("#closeAvatar");

    function setAvatarVisible(visible) {
      app.classList.toggle("avatar-on", visible);
      toggle.setAttribute("aria-checked", String(visible));
    }

    toggle.addEventListener("click", () => {
      setAvatarVisible(toggle.getAttribute("aria-checked") !== "true");
    });
    closeAvatar.addEventListener("click", () => setAvatarVisible(false));
  </script>
</body>
</html>
